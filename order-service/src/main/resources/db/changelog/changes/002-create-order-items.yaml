databaseChangeLog:
  - changeSet:
      id: 002-create-order-items
      author: m111
      changes:
        - createTable:
            tableName: order_item_entity
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_order
                    references: orders(id)
              - column:
                  name: item_id
                  type: BIGINT
              - column:
                  name: quantity
                  type: INTEGER
              - column:
                  name: item_name
                  type: VARCHAR(255)
              - column:
                  name: price_at_purchase
                  type: DECIMAL(19, 2)
