databaseChangeLog:
  - changeSet:
      id: 001-create-orders-sequence
      author: m1has
      changes:
        - createSequence:
            sequenceName: orders_seq
            startValue: 1
            incrementBy: 50

  - changeSet:
      id: 001-create-orders-table
      author: m1has
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: costumer_id
                  type: bigint
              - column:
                  name: address
                  type: varchar(255)
              - column:
                  name: total_amount
                  type: numeric(19, 2)
              - column:
                  name: courier_name
                  type: varchar(255)
              - column:
                  name: eta_minutes
                  type: integer
              - column:
                  name: order_status
                  type: varchar(50)
                  constraints:
                    nullable: false
