spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

order-paid-topic: orders.event
delivery-assigned-topic: delivery.events

payment-service:
  base-url: http://localhost:8081

logging:
  level:
    org.hibernate.SQL: DEBUG
