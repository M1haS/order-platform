databaseChangeLog:
  - changeSet:
      id: 001-create-deliveries
      author: m111
      changes:
        - createTable:
            tableName: deliveries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: courier_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: eta_minutes
                  type: INTEGER
                  constraints:
                    nullable: false
