databaseChangeLog:
  - changeSet:
      id: 001-create-deliveries-sequence
      author: m1has
      changes:
        - createSequence:
            sequenceName: deliveries_seq
            startValue: 1
            incrementBy: 50

  - changeSet:
      id: 001-create-deliveries-table
      author: m1has
      changes:
        - createTable:
            tableName: deliveries
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: courier_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: eta_minutes
                  type: integer
                  constraints:
                    nullable: false
